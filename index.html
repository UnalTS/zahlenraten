<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zahlenraten</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    h1 { margin-top: 0; font-size: 24px; }
    p { margin: 8px 0; }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #1f6feb;
      color: white;
    }

    button.secondary {
      background: #6c757d;
    }

    #message {
      margin-top: 12px;
      font-weight: bold;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Zahlenraten</h1>
    <p>Ich denke an eine Zahl von 1 bis 100.</p>
    <p>Versuche: <span id="tries">0</span></p>
    <p>Zu niedrig: <span id="lowGuesses">-</span></p>
    <p>Zu hoch: <span id="highGuesses">-</span></p>

    <input id="guessInput" type="number" min="1" max="100" placeholder="Dein Tipp (1-100)" />
    <button id="guessBtn">Raten</button>
    <button id="resetBtn" class="secondary">Neues Spiel</button>

    <p id="message"></p>
  </div>

  <script>
    let secretNumber = Math.floor(Math.random() * 100) + 1;
    let tries = 0;
    let gameOver = false;
    let lowGuesses = [];
    let highGuesses = [];

    const guessInput = document.getElementById("guessInput");
    const guessBtn = document.getElementById("guessBtn");
    const resetBtn = document.getElementById("resetBtn");
    const message = document.getElementById("message");
    const triesText = document.getElementById("tries");
    const lowGuessesText = document.getElementById("lowGuesses");
    const highGuessesText = document.getElementById("highGuesses");

    function handleGuess() {
      if (gameOver) return;

      const guess = Number(guessInput.value);

      if (!guess || guess < 1 || guess > 100) {
        message.textContent = "Bitte eine Zahl von 1 bis 100 eingeben.";
        return;
      }

      tries++;
      triesText.textContent = tries;

      if (guess === secretNumber) {
        message.textContent = `Richtig! Du hast ${tries} Versuche gebraucht.`;
        gameOver = true;
      } else if (guess < secretNumber) {
        lowGuesses.push(`${guess} ↑`);
        lowGuessesText.textContent = lowGuesses.join(", ");
        message.textContent = "Zu niedrig!";
      } else {
        highGuesses.push(`${guess} ↓`);
        highGuessesText.textContent = highGuesses.join(", ");
        message.textContent = "Zu hoch!";
      }

      guessInput.value = "";
      guessInput.focus();
    }

    function resetGame() {
      secretNumber = Math.floor(Math.random() * 100) + 1;
      tries = 0;
      gameOver = false;
      lowGuesses = [];
      highGuesses = [];
      triesText.textContent = "0";
      lowGuessesText.textContent = "-";
      highGuessesText.textContent = "-";
      message.textContent = "";
      guessInput.value = "";
      guessInput.focus();
    }

    guessBtn.addEventListener("click", handleGuess);
    resetBtn.addEventListener("click", resetGame);
    guessInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleGuess();
    });
  </script>
</body>
</html>

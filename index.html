<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zahlenraten</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>Zahlenraten</h1>
    <p>Ich denke an eine Zahl von 1 bis 100.</p>
    <p>Versuche: <span id="tries">0</span></p>
    <p>Zu niedrig: <span id="lowGuesses">-</span></p>
    <p>Zu hoch: <span id="highGuesses">-</span></p>

    <input id="guessInput" type="number" min="1" max="100" placeholder="Dein Tipp (1-100)" />
    <button id="guessBtn">Raten</button>
    <button id="resetBtn" class="secondary">Neues Spiel</button>

    <p id="message"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
